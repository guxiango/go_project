syntax = "proto3";

package api.mapService;

option go_package = "order/api/mapService;mapService";

service MapService {
  rpc GetDrivingInfo (GetDrivingInfoRequest) returns (GetDrivingInfoReply);
}

message GetDrivingInfoRequest {
  string origin = 1;
  string destination = 2;
}

message GetDrivingInfoReply {
  string origin = 1;
  string destination = 2;
  string distance = 3;
  string duration = 4;
}
