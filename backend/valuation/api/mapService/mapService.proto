syntax = "proto3";

package api.mapService;

option go_package = "valuation/api/mapService;mapService";

service MapService {
	rpc GetDrivingInfo (GetDrivingInfoRequest) returns (GetDrivingInfoReply);	
}

message GetDrivingInfoRequest {
	string origin = 1;			// 起点坐标
	string destination = 2;		// 终点坐标
}

message GetDrivingInfoReply {
	string origin = 1;			// 起点坐标
	string destination = 2;		// 终点坐标
	string distance = 3;		// 距离(米)
	string duration = 4;		// 时间(秒)
}