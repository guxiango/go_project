syntax = "proto3";
package kratos.api;

option go_package = "admin/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Service service = 3;
  Security security = 4;
}

message Security {
  message JWT {
    string secret = 1;
    int64 ttl_seconds = 2;
  }
  message SeedAdmin {
    string username = 1;
    string password = 2;
    string role = 3;
  }
  JWT jwt = 1;
  SeedAdmin seed_admin = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Service {
  message Consul {
    string addr = 1;
  }
  message Driver {
    string endpoint = 1;
    string internal_token = 2;
  }
  Consul consul = 1;
  Driver driver = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}
