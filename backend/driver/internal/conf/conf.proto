syntax = "proto3";
package kratos.api;

option go_package = "driver/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Service service = 3;
  Security security = 4;
}


message Security {
  message JWT {
    string secret = 1;
    int64 ttl_seconds = 2;
  }
  JWT jwt = 1;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Service {
  message Consul {
    string addr = 1;
  }
  message Trace {
    string otlp_endpoint = 1;
  }
  Consul consul = 1;
  Trace trace = 2;
  string internal_token = 3;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}
