syntax = "proto3";

package api.customer;

option go_package = "customer/api/customer;customer";
import "google/api/annotations.proto";

service Customer {
	// 获取验证码的服务
	rpc GetVerifyCode (GetVerifyCodeReq) returns (GetVerifyCodeRsp) {
		option (google.api.http) = {
			get: "/customer/get-verify-code/{telephone}"
		};
	}


	rpc Login (LoginReq) returns (LoginRsp) {
		option (google.api.http) = {
			post: "/customer/login",
			body: "*", 				// 请求体为LoginReq
		};
	}

	rpc Logout (LogoutReq) returns (LogoutRsp) {
		option (google.api.http) = {
			get: "/customer/logout",
		};
	}

	// 价格预估
	rpc GetEstimatePrice (GetEstimatePriceReq) returns (GetEstimatePriceRsp) {
		option (google.api.http) = {
			get: "/customer/get-estimate-price",
		};
	}
}

// 价格预估请求
message GetEstimatePriceReq {
	string origin = 1;			// 起点坐标
	string destination = 2;		// 终点坐标
}

// 价格预估回复
message GetEstimatePriceRsp {
	int64 code = 1;			// 状态码
	string message = 2;		// 消息
	int64 price = 3;			// 预估价格
}

// 登出请求
message LogoutReq {
}

// 登出回复
message LogoutRsp {
	int64 code = 1;
	string message = 2;
}

// 登录请求
message LoginReq {
	string telephone = 1;
	string verify_code = 2;
}

// 登录回复
message LoginRsp {
	int64 code = 1;
	string message = 2;
	string token = 3;			// 令牌
	int64 token_create_at = 4;	// 令牌生成时间
	int32 token_ttl = 5;		// 令牌过期时间
}
// 获取验证码请求
message GetVerifyCodeReq {
	string telephone = 1;
}

// 获取验证码回复
message GetVerifyCodeRsp {
	int64 code = 1;
	string message = 2;
	string verify_code = 3;		// 验证码
	int64 verify_code_time = 4;	// 验证码生成时间
	int32 verify_code_ttl = 5;	// 验证码过期时间
}