syntax = "proto3";
package kratos.api;

option go_package = "customer/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Security security = 3;
  Service service = 4;
}

message Security {
  // HS256 密钥，生产环境务必改为足够长的随机串并妥善保管
  string jwt_secret = 1;
  // 令牌有效期（秒）
  int32 jwt_ttl_seconds = 2;
}

message Service {
  message Consul {
    string addr = 1;
  }
  message Trace {
    string otlp_endpoint = 1;
  }
  Consul consul = 1;
  Trace trace = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}
